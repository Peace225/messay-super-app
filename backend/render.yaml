services:
    - type: web
    name: messay-api
    env: node
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    envVars:
            - key: DATABASE_URL
        fromDatabase:
          name: messay-db
          property: connectionString
            - key: NODE_ENV
        value: production
            - key: CORS_ORIGIN
        value: "*"
            - key: PORT
        value: 10000

databases:
    - name: messay-db
    plan: free